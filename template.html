<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>한국 핵심광물 ODA 협력국 주간 동향 · KCMO Weekly</title>
  <meta name="description" content="한국이 핵심광물 ODA 협력을 진행 중인 7개국(탄자니아·인도네시아·베트남·몽골·카자흐스탄·우즈베키스탄·라오스)의 정책·탐사·개발·공급망·연구 동향 주간 큐레이션.">
  <link rel="alternate" type="application/rss+xml" title="KCMO Weekly RSS" href="rss.xml">
  <style>
    :root {
      --primary: #2d5016;
      --primary-light: #4a7a2a;
      --primary-bg: #EAF3DE;
      --primary-fg: #173404;
      --teal-bg: #E1F5EE;
      --teal-fg: #04342C;
      --amber-bg: #FAEEDA;
      --amber-fg: #412402;
      --text: #222;
      --text-secondary: #666;
      --text-tertiary: #999;
      --bg: #fafaf7;
      --surface: #fff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #4a7a2a;
        --primary-bg: #1d2a10;
        --primary-fg: #C0DD97;
        --teal-bg: #043028;
        --teal-fg: #9FE1CB;
        --amber-bg: #2a1f0a;
        --amber-fg: #FAC775;
        --text: #e8e8e3;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --bg: #1a1a18;
        --surface: #242422;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.2);
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Pretendard", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 0;
    }

    header.site {
      background: var(--primary);
      color: var(--primary-bg);
      padding: 1.75rem 1.75rem 1.5rem;
    }
    header.site .branding {
      display: flex; justify-content: space-between;
      align-items: baseline; flex-wrap: wrap; gap: 12px;
    }
    header.site .brand-mark {
      font-size: 11px; letter-spacing: 1.5px;
      opacity: 0.75; margin-bottom: 6px;
    }
    header.site h1 {
      font-size: 22px; font-weight: 500;
      margin: 0; color: var(--primary-bg);
    }
    header.site .subtitle {
      font-size: 12px; opacity: 0.85; margin-top: 8px;
    }
    header.site .curator {
      font-size: 11px; opacity: 0.75; margin-top: 6px; font-style: italic;
    }
    header.site .meta { text-align: right; font-size: 13px; opacity: 0.9; }
    header.site .meta .next { font-size: 11px; opacity: 0.75; margin-top: 4px; }
    header.site .week-selector {
      font: inherit; font-size: 12px;
      padding: 3px 8px; margin-bottom: 6px;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
      background: rgba(255,255,255,0.08); color: var(--primary-bg);
      cursor: pointer; max-width: 220px;
    }
    header.site .week-selector option { color: var(--text); background: var(--surface); }

    /* 메일 구독 블록 */
    .subscribe-block {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .subscribe-label {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 8px;
      opacity: 0.95;
    }
    .subscribe-form {
      display: flex;
      gap: 8px;
      max-width: 500px;
      flex-wrap: wrap;
    }
    .subscribe-input {
      flex: 1;
      min-width: 220px;
      padding: 7px 12px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 13px;
      font-family: inherit;
    }
    .subscribe-input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .subscribe-input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.18);
    }
    .subscribe-btn {
      padding: 7px 18px;
      background: white;
      color: var(--primary);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .subscribe-btn:hover {
      background: rgba(255,255,255,0.92);
    }
    .subscribe-hint {
      font-size: 10.5px;
      opacity: 0.7;
      margin-top: 6px;
      font-style: italic;
    }

    .filters {
      background: var(--surface);
      padding: 14px 1.75rem;
      border-bottom: 0.5px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .filters .row {
      display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
    }
    .filter {
      display: flex; align-items: center; gap: 6px;
    }
    .filter label {
      font-size: 11px; color: var(--text-secondary);
      letter-spacing: 0.3px;
    }
    .filter select {
      font-size: 12px; padding: 4px 8px;
      border: 0.5px solid var(--border-strong);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
    }
    .filter.sort { margin-left: auto; }

    .empty {
      padding: 3rem 1.75rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    main {
      padding: 16px 1.75rem 2rem;
    }
    .results-info {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .card {
      background: var(--surface);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 1.1rem 1.4rem 1.2rem;
      margin-bottom: 12px;
    }
    .card-meta {
      display: flex; gap: 6px; flex-wrap: wrap;
      align-items: center; margin-bottom: 10px;
    }
    .chip {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
    }
    .chip-country {
      background: var(--primary-bg);
      color: var(--primary-fg);
      font-weight: 500;
    }
    .chip-category {
      background: var(--teal-bg);
      color: var(--teal-fg);
      font-weight: 500;
    }
    .chip-tag {
      background: var(--bg);
      color: var(--text-secondary);
    }
    .chip-lang {
      background: var(--amber-bg);
      color: var(--amber-fg);
      font-size: 10px;
      font-weight: 500;
    }
    /* 클릭 가능한 원문 링크 chip - 박사님 UX 개선 */
    .chip-lang-link {
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }
    .chip-lang-link:hover {
      background: var(--amber-fg);
      color: white;
    }
    .card-score {
      margin-left: auto;
      color: var(--text-tertiary);
      font-size: 11px;
      font-family: "SF Mono", Menlo, monospace;
    }

    .card h3 {
      font-size: 15.5px;
      font-weight: 500;
      margin: 0 0 6px 0;
      line-height: 1.45;
    }
    .card h3 a {
      color: var(--text);
      text-decoration: none;
    }
    .card h3 a:hover {
      color: var(--primary);
    }
    .card-source {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 12px;
      font-size: 11px; color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .card .summary {
      border-left: 2px solid var(--primary);
      padding: 2px 0 2px 12px;
      margin: 0 0 12px 0;
    }
    .card .summary p {
      margin: 0 0 4px 0;
      font-size: 13.5px;
      line-height: 1.65;
    }
    .card .summary p:last-child { margin-bottom: 0; }

    .relevance {
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
    }
    .relevance-label {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }
    .relevance p {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.55;
    }

    .phrases {
      margin-top: 10px;
    }
    .phrases summary {
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 12px;
      padding: 4px 0;
      list-style: none;
    }
    .phrases summary::-webkit-details-marker { display: none; }
    .phrases summary::before {
      content: "▸ ";
      color: var(--text-tertiary);
      display: inline-block;
      transition: transform 0.15s;
    }
    .phrases[open] summary::before {
      content: "▾ ";
    }
    .phrases table {
      width: 100%;
      margin-top: 6px;
      font-size: 13px;
      border-collapse: collapse;
    }
    .phrases td {
      padding: 6px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .phrases td.phrase {
      font-family: Georgia, serif;
    }
    .phrases td.meaning {
      text-align: right;
      color: var(--text-secondary);
    }

    footer.site {
      background: var(--surface);
      padding: 14px 1.75rem;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 0.5px solid var(--border);
      text-align: center;
    }
    footer.site a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      header.site, .filters, main, footer.site { padding-left: 1rem; padding-right: 1rem; }
      header.site h1 { font-size: 18px; }
      header.site .meta { text-align: left; width: 100%; }
      .filter.sort { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header class="site">
    <div class="branding">
      <div>
        <div class="brand-mark">KCMO WEEKLY</div>
        <h1>한국 핵심광물 ODA 협력국 주간 동향</h1>
        <div class="subtitle">탄자니아 · 인도네시아 · 베트남 · 몽골 · 카자흐스탄 · 우즈베키스탄 · 라오스</div>
        <div class="curator">Curated by 조성준 (KIGAM)</div>
      </div>
      <div class="meta">
        <div>
          <select id="week-selector" class="week-selector" aria-label="회차 선택">
            <option value="" disabled selected>회차 선택</option>
          </select>
        </div>
        <div>{{WEEK_OF}} 발행</div>
        <div class="next">{{TOTAL}} cards · 다음 발송: {{NEXT_DISPATCH}}</div>
      </div>
    </div>

    <!-- 메일 구독 폼 (Mailchimp) -->
    <div class="subscribe-block">
      <div class="subscribe-label">매주 일요일 아침, 메일로 받아보기</div>
      <form action="{{MAILCHIMP_FORM_URL}}" method="post" target="_blank" novalidate class="subscribe-form">
        <input type="email" name="EMAIL" placeholder="이메일 주소" required class="subscribe-input">
        <!-- Mailchimp 봇 차단용 honeypot 필드 (사용자에게 안 보임) -->
        <div aria-hidden="true" style="position: absolute; left: -5000px;">
          <input type="text" name="b_dda99bfc442fc94e2a241297d_0592005ac7" tabindex="-1" value="">
        </div>
        <button type="submit" name="subscribe" class="subscribe-btn">구독</button>
      </form>
      <div class="subscribe-hint">※ 기관 메일은 스팸 처리될 수 있으니 개인 메일을 권장합니다</div>
    </div>
  </header>

  <div class="filters">
    <div class="row">
      <div class="filter">
        <label for="f-country">국가</label>
        <select id="f-country">
          {{COUNTRY_OPTIONS}}
        </select>
      </div>
      <div class="filter">
        <label for="f-category">카테고리</label>
        <select id="f-category">
          {{CATEGORY_OPTIONS}}
        </select>
      </div>
      <div class="filter">
        <label for="f-tag">광종/태그</label>
        <select id="f-tag">
          {{TAG_OPTIONS}}
        </select>
      </div>
      <div class="filter sort">
        <label for="f-sort">정렬</label>
        <select id="f-sort">
          <option value="score">점수순</option>
          <option value="recent">최신순</option>
        </select>
      </div>
    </div>
  </div>

  <main id="cards">
    <div class="results-info" id="results-info"></div>
    {{CARDS_HTML}}
  </main>

  <footer class="site">
    한국지질자원연구원(KIGAM) · 한국자원공학회 · 자동 큐레이션 by Claude AI (Anthropic)
  </footer>

</div>

<script>
(function() {
  // ─────────────────────────────────────────────────────────
  // 필터 + 정렬 + 회차 풀다운
  // 현재 회차는 서버에서 pre-render된 카드를 그대로 사용 (SEO 유지).
  // 풀다운에서 다른 회차 선택 시 해당 cards JSON fetch → DOM 재구성.
  // ─────────────────────────────────────────────────────────
  let cards = Array.from(document.querySelectorAll('.card'));
  const $country = document.getElementById('f-country');
  const $category = document.getElementById('f-category');
  const $tag = document.getElementById('f-tag');
  const $sort = document.getElementById('f-sort');
  const $info = document.getElementById('results-info');
  const $main = document.getElementById('cards');
  const $weekSelector = document.getElementById('week-selector');
  const CURRENT_WEEK = '{{WEEK_OF}}';

  function applyFilters() {
    const ct = $country.value;
    const cg = $category.value;
    const tg = $tag.value;

    let visible = 0;
    cards.forEach(card => {
      const c = card.dataset.country || '';
      const g = card.dataset.category || '';
      const tags = (card.dataset.tags || '').split(',');

      const okCountry = !ct || c === ct;
      const okCategory = !cg || g === cg;
      const okTag = !tg || tags.includes(tg);

      const show = okCountry && okCategory && okTag;
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    });

    $info.textContent = visible === cards.length
      ? `${visible}건 표시 중`
      : `${visible}건 표시 중 (전체 ${cards.length}건)`;
  }

  function applySort() {
    const mode = $sort.value;
    const sorted = cards.slice().sort((a, b) => {
      if (mode === 'recent') {
        return (b.dataset.published || '').localeCompare(a.dataset.published || '');
      }
      return parseInt(b.dataset.score || 0) - parseInt(a.dataset.score || 0);
    });
    sorted.forEach(card => $main.appendChild(card));
  }

  [$country, $category, $tag].forEach(el => el.addEventListener('change', applyFilters));
  $sort.addEventListener('change', () => { applySort(); applyFilters(); });

  // ─────────────────────────────────────────────────────────
  // 회차 풀다운 (archive-index.json)
  // ─────────────────────────────────────────────────────────
  const COUNTRY_KO = {
    Tanzania: '탄자니아', Indonesia: '인도네시아', Vietnam: '베트남',
    Mongolia: '몽골', Kazakhstan: '카자흐스탄',
    Uzbekistan: '우즈베키스탄', Laos: '라오스',
  };
  const CATEGORY_KO = {
    oda_cooperation: 'ODA 협력', policy_regulation: '정책·법규',
    exploration_development: '탐사·개발', supply_chain_trade: '공급망·교역',
    research_academic: '연구·학술',
  };
  const LANGUAGE_KO = {
    sw: 'sw 원문', ko: 'ko 원문', en: 'en 원문',
    id: 'id 원문', vi: 'vi 원문', mn: 'mn 원문',
  };

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // build_index.py 의 render_card() 를 JS로 포팅.
  // 카드 HTML 구조가 바뀌면 양쪽 동시에 수정해야 함.
  function renderCard(card) {
    const countryKo = COUNTRY_KO[card.country] || card.country || '';
    const categoryKo = card.category_ko || CATEGORY_KO[card.category] || '';
    const langBadge = LANGUAGE_KO[card.source_language || 'en'] || '원문';
    const tags = card.tags || [];
    const prominentTags = tags.slice(0, 2);

    const summaryHtml = (card.korean_summary || [])
      .map(l => `      <p>${esc(l)}</p>`).join('\n');

    let phrasesHtml = '';
    const phrases = card.key_phrases || [];
    if (phrases.length) {
      const rows = phrases.map(p =>
        `        <tr><td class="phrase">${esc(p.phrase || '')}</td>` +
        `<td class="meaning">${esc(p.meaning || '')}</td></tr>`
      ).join('\n');
      phrasesHtml = `
    <details class="phrases">
      <summary>원문 핵심 표현 ${phrases.length}개 보기</summary>
      <table>
${rows}
      </table>
    </details>`;
    }

    let relevanceHtml = '';
    if (card.oda_relevance) {
      relevanceHtml = `
    <div class="relevance">
      <div class="relevance-label">한국 ODA 시사점</div>
      <p>${esc(card.oda_relevance)}</p>
    </div>`;
    }

    const tagChips = prominentTags
      .map(t => `      <span class="chip chip-tag">${esc(t)}</span>`)
      .join('\n');

    return `<article class="card"
    data-id="${esc(card.id || '')}"
    data-country="${esc(card.country || '')}"
    data-category="${esc(card.category || '')}"
    data-language="${esc(card.source_language || 'en')}"
    data-tags="${esc(tags.join(','))}"
    data-score="${esc(card.score || 0)}"
    data-published="${esc(card.published || '')}">
    <div class="card-meta">
      <span class="chip chip-country">${esc(countryKo)}</span>
      <span class="chip chip-category">${esc(categoryKo)}</span>
${tagChips}
      <span class="card-score">${esc(card.score || 0)}</span>
    </div>
    <h3><a href="${esc(card.url || '#')}" target="_blank" rel="noopener">${esc(card.title || '')}</a></h3>
    <div class="card-source">
      <span>${esc(card.source || '')} · ${esc(card.published || '')}</span>
      <a class="chip chip-lang chip-lang-link" href="${esc(card.url || '#')}" target="_blank" rel="noopener" title="원문 보기">${esc(langBadge)} ↗</a>
    </div>
    <div class="summary">
${summaryHtml}
    </div>${relevanceHtml}${phrasesHtml}
  </article>`;
  }

  // build_index.py 의 count_by + collect_tags + build_filter_options 를
  // JS 로 포팅. 회차 변경 시 필터 select 옵션을 그 회차의 카드 기준으로
  // 재구성. select.innerHTML 을 통째로 갈아엎으므로 사용자 선택값은
  // 자연스럽게 "전체"로 리셋됨.
  function rebuildFilterOptions(articles) {
    const countryCounts = {};
    const categoryCounts = {};
    const tagCounts = {};
    articles.forEach(a => {
      if (a.country) countryCounts[a.country] = (countryCounts[a.country] || 0) + 1;
      if (a.category) categoryCounts[a.category] = (categoryCounts[a.category] || 0) + 1;
      (a.tags || []).forEach(t => {
        tagCounts[t] = (tagCounts[t] || 0) + 1;
      });
    });

    const total = articles.length;
    const buildOpts = (counts, koMap, limit) => {
      let items = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      if (limit) items = items.slice(0, limit);
      const head = `<option value="">전체 (${total})</option>`;
      const rest = items.map(([val, cnt]) => {
        const label = koMap ? (koMap[val] || val) : val;
        return `<option value="${esc(val)}">${esc(label)} (${cnt})</option>`;
      }).join('');
      return head + rest;
    };

    $country.innerHTML = buildOpts(countryCounts, COUNTRY_KO);
    $category.innerHTML = buildOpts(categoryCounts, CATEGORY_KO);
    $tag.innerHTML = buildOpts(tagCounts, null, 10);
  }

  async function loadArchiveIndex() {
    if (!$weekSelector) return;
    try {
      const res = await fetch('./data/archive-index.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const index = await res.json();
      if (!index.weeks || !index.weeks.length) throw new Error('empty index');

      $weekSelector.innerHTML = '';
      index.weeks.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w.filename;
        opt.textContent = `${w.week_of} (${w.total_cards} cards)`;
        opt.dataset.weekOf = w.week_of;
        if (w.week_of === CURRENT_WEEK) opt.selected = true;
        $weekSelector.appendChild(opt);
      });

      $weekSelector.addEventListener('change', (e) => {
        const opt = e.target.selectedOptions[0];
        if (!opt || !opt.value) return;
        if (opt.dataset.weekOf === CURRENT_WEEK) {
          // 현재 회차는 이미 임베드된 카드 그대로 사용 — 재로드 불필요
          return;
        }
        loadWeek(opt.value);
      });
    } catch (e) {
      // archive index 없거나 fetch 실패 시 풀다운 숨김
      $weekSelector.style.display = 'none';
    }
  }

  async function loadWeek(filename) {
    try {
      const res = await fetch(`./data/${filename}?t=` + Date.now());
      const data = await res.json();
      const articles = (data.articles || []).slice()
        .sort((a, b) => (b.score || 0) - (a.score || 0));

      // 기존 카드/empty 메시지 제거 ($results-info 는 보존)
      $main.querySelectorAll('article.card, p.empty').forEach(el => el.remove());

      if (!articles.length) {
        const empty = document.createElement('p');
        empty.className = 'empty';
        empty.textContent = '이 회차는 임계값 이상의 ODA 동향이 없습니다.';
        $main.appendChild(empty);
      } else {
        articles.forEach(a => {
          $main.insertAdjacentHTML('beforeend', renderCard(a));
        });
      }

      // cards 배열을 새 DOM 으로 재바인딩 + 필터 옵션을 새 회차 기준으로 재구성
      cards = Array.from(document.querySelectorAll('.card'));
      rebuildFilterOptions(articles);
      applyFilters();
    } catch (e) {
      console.error('Failed to load week', filename, e);
    }
  }

  applyFilters();
  loadArchiveIndex();
})();
</script>

<script type="application/json" id="cards-data">{{CARDS_DATA}}</script>

</body>
</html>
