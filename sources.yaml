      - "형석"
      - "안티몬"
      - "보크사이트"
      - "백금"
      # 금 (광업 맥락)
      - "금광"
      - "금 채굴"
      - "금광산"
      # ── 러시아어 광종명 ──
      - "литий"
      - "кобальт"
      - "никель"
      - "марганец"
      - "графит"
      - "вольфрам"
      - "молибден"
      - "ванадий"
      - "титан"
      - "ниобий"
      - "тантал"
      - "редкоземельные"
      - "редкие металлы"
      - "уран"
      - "флюорит"
      - "сурьма"
      # ── 베트남어 ──
      - "coban"
      - "niken"
      - "mangan"
      - "than chì"
      - "vonfram"
      - "molypden"
      - "đất hiếm"
      # ── 인도네시아어 ──
      - "litium"
