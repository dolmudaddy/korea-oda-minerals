      verified: true

    - name: "대한민국 정책브리핑"
      url: "https://www.korea.kr/briefing/pressReleaseList.do"
      rss: null
      country: korea
      language: ko
      scrape_method: html_listing
      verified: true

# =====================================================================
# Tier 3: Tanzania local media
# =====================================================================
tier_3_tanzania_media:
  weight: 3
  sources:
    - name: "Mwananchi (Swahili)"
      url: "https://www.mwananchi.co.tz/mw"
      rss: null
      scrape_method: html_listing
      country: Tanzania
      language: sw
      verified: true

    - name: "SwahiliTimes"
      url: "https://swahilitimes.co.tz/"
      rss: null
      scrape_method: html_listing
      country: Tanzania
      language: sw
      verified: true

    - name: "The Citizen Tanzania"
      url: "https://www.thecitizen.co.tz/"
      rss: null
      scrape_method: html_listing
      country: Tanzania
      language: en
      verified: pending

    - name: "African Mining Market - Tanzania"
      url: "https://africanminingmarket.com/country/tanzania/"
      rss: null
      scrape_method: html_listing
      country: Tanzania
      language: en
      verified: true

# =====================================================================
# Tier 4: Google News broad search
# =====================================================================
tier_4_broad_search:
  weight: 1
  sources: []  # Phase A에서는 Tier 1~3만 운영
  english_queries:
    - "Tanzania graphite mining"
    - "Tanzania rare earth"
    - "Tanzania uranium Mantra Namtumbo"
    - "Tanzania nickel Kabanga"
    - "Tanzania critical minerals"
  swahili_queries:
    - "Tanzania madini ya kimkakati"
    - "Tanzania uchimbaji urani"
    - "Wizara ya Madini taarifa"
  korea_cross_queries:
    - "Korea Tanzania mineral cooperation"
    - "한국 탄자니아 ODA 광물"
    - "KIGAM Tanzania"
    - "KOICA 탄자니아 광물"

# =====================================================================
# Scoring config
# =====================================================================
scoring:
  country_required: true
  min_score_threshold: 7
  local_language_bonus: 3

  korea_keywords:
    weight: 5
    terms:
      en: ["Korea", "Korean", "Republic of Korea", "South Korea"]
      ko: ["한국", "KIGAM", "KOICA", "KOMIR", "KOTRA", "EDCF", "MOTIE", "MOFA"]
      sw: ["Korea", "Kikorea", "Jamhuri ya Korea"]

  oda_keywords:
    en:
      ODA: 5
      "development cooperation": 4
      EDCF: 5
      "feasibility study": 4
      "technical assistance": 4
      "joint venture": 3
      MOU: 3
      bilateral: 3
    ko:
      "공적개발원조": 5
      "개발협력": 4
      "기술협력": 4
      "양해각서": 3
    sw:
      "ushirikiano wa maendeleo": 4
      makubaliano: 3
      mkataba: 3
      ubia: 3
      "msaada wa kiufundi": 4

  recency_bonus:
    within_3_days: 2
    within_7_days: 1
  freshness_days: 30

# =====================================================================
# Special handlers
# =====================================================================
special_handlers:
  pdf_extraction:
    enabled: false  # Phase A 테스트에서는 비활성, 별도 단계에서 구현
    target_dirs:
      - "https://www.madini.go.tz/media/"
    file_pattern: "*.pdf"
  swahili_summarization:
    enabled: true
    note: "summarize.py 단계에서 적용 예정"
