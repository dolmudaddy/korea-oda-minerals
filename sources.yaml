# =====================================================================
# KCMO Weekly - sources.yaml (v4, Phase B: ID + VN + MN expansion)
# Korea Critical Minerals ODA Weekly
# =====================================================================
# Phase A (Tanzania) preserved as-is. Phase B adds 3 countries.

target_countries:
  - name: Tanzania
    name_ko: 탄자니아
    languages: [sw, en]
    language_priority: sw
    priority: 1
    primary_minerals: [graphite, rare_earth, uranium, gold, nickel, helium]
    note: "박사님 직접 담당 ODA 프로젝트국"

  - name: Indonesia
    name_ko: 인도네시아
    languages: [id, en]
    language_priority: id
    priority: 2
    primary_minerals: [nickel, cobalt, copper, tin, bauxite]
    note: "한·인도네시아 핵심광물 협력 MOU, ESDM 부 채널"

  - name: Vietnam
    name_ko: 베트남
    languages: [vi, en]
    language_priority: vi
    priority: 2
    primary_minerals: [rare_earth, tungsten, titanium, bauxite]
    note: "베트남 희토류 자원 협력, MOIT 채널"

  - name: Mongolia
    name_ko: 몽골
    languages: [mn, en]
    language_priority: en
    priority: 2
    primary_minerals: [copper, coal, uranium, fluorspar, rare_earth]
    note: "한·몽 자원외교, MRPAM 채널"

  - name: Kazakhstan
    name_ko: 카자흐스탄
    languages: [ru, kk, en]
    language_priority: ru
    priority: 2
    primary_minerals: [uranium, tungsten, chromium, copper, rare_earth]
    note: "세계 최대 우라늄 생산국. 러시아어가 실무 공식어."

  - name: Uzbekistan
    name_ko: 우즈베키스탄
    languages: [ru, uz, en]
    language_priority: ru
    priority: 3
    primary_minerals: [uranium, gold, tungsten, rare_earth, copper]
    note: "중앙아 우라늄·금 주요 생산국. KOMIR·KIGAM 협력 진행."

  - name: Laos
    name_ko: 라오스
    languages: [en, lo]
    language_priority: en
    priority: 3
    primary_minerals: [bauxite, copper, gold, potash, rare_earth]
    note: "동남아 광물 후발국. 영문 채널이 더 안정적."

