      - "ທອງແດງ"

    # ────────────────────────────────────────────────────────────
    # 4. 광종명 - 단어 경계 (짧은 약어, 부분일치 사고 방지)
    # ────────────────────────────────────────────────────────────
    # 예: "REE"는 "agREE", "tREE" 같은 단어에 부정확 매칭 방지
    core_minerals_wordbound:
      - "REE"     # rare earth elements
