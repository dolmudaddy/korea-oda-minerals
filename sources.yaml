# =====================================================================
# Scoring config
# =====================================================================
scoring:
  country_required: true
  min_score_threshold: 8   # 2026-05-15: 10 → 8. v6 필터로 노이즈 카드 사전 제거되어 threshold 완화. 한국어 단속 카드(정상회담·자원외교) 발송 가능
  local_language_bonus: 3

  # ===================================================================
  # [A] 핵심광물 키워드 사전 (v6 재설계, 2026-05-15)
  # ===================================================================
  # 박사님 실제 카드 분석 후 재설계. 단순 키워드 매칭 한계 극복.
  #
  # 구조:
  #   1. exclusion_terms: 매칭 시 즉시 폐기 (광업 무관 영역 차단)
  #      - gold reserves (외환), HPV (보건), film/movie (영화),
  #        railway tariff (교통) 등
  #   2. core_minerals: 광종 직접 언급 (강한 신호 - 통과)
  #      - lithium, cobalt, 희소금속, 우라늄 등
  #      - "gold mining"은 통과, "gold reserves"는 #1에서 차단
  #   3. domain_terms: KCMO 도메인 어휘 (통과)
  #      - 핵심광물, 자원외교, 산업기술협력, critical mineral 등
  #   4. core_minerals_wordbound, exclusion_wordbound:
  #      - REE, PGM, HPV 같은 짧은 약어 (단어 경계 필요)
  #      - "agREE", "domestic"에 부정확 매칭 방지
  #
  # 필터 순서 (collect.py에서 처리):
  #   exclusion → core(부분일치) → core(단어경계) → domain → 폐기
  # ===================================================================
  critical_mineral_keywords:
    enabled: true

    # ────────────────────────────────────────────────────────────
    # 1. 제외 키워드 - 부분일치 (매칭 시 무조건 폐기)
    # ────────────────────────────────────────────────────────────
    exclusion_terms:
      # 금융/외환 (gold reserves ≠ gold mining)
      - "gold reserves"
      - "gold reserve"
      - "gold price"
      - "gold rally"
      - "copper price"
      - "copper rally"
      - "foreign reserves"
      - "currency reserves"
      - "central bank reserves"
      - "금 보유고"
      - "외환보유고"
      - "환율"
      - "외환 보유"
      - "exchange rate"
      - "currency exchange"
      # 보건
      - "vaccine"
      - "vaccination"
      - "vaccinate"
      - "covid"
      - "pandemic"
      - "백신"
      - "예방접종"
      - "감염병"
      # 영화/문화/스포츠
      - "film festival"
      - "film budget"
      - "movie"
      - "cinema"
      - "blockbuster"
      - "actor"
      - "actress"
      - "tournament"
      - "football"
      - "soccer"
      - "olympic"
      - "concert"
      - "drama series"
      - "영화"
      - "드라마"
      - "콘서트"
      - "예능"
      - "esports"
      # 운송 운임 (광물 운송 제외)
      - "railway tariff"
      - "passenger transport"
      - "passenger fare"
      - "train ticket"
      - "bus fare"
      - "airline ticket"
      - "철도 운임"
      - "여객 운임"
      - "항공권"
      # 비자/이민
      - "visa policy"
      - "visa fee"
      - "passport policy"
      - "immigration policy"

    # ────────────────────────────────────────────────────────────
    # 2. 제외 키워드 - 단어 경계 (짧은 약어, 부분일치 사고 방지)
    # ────────────────────────────────────────────────────────────
    exclusion_wordbound:
      - "HPV"     # human papillomavirus
      - "MERS"    # 메르스
      - "SARS"

    # ────────────────────────────────────────────────────────────
    # 3. 광종명 - 부분일치 (직접 언급 시 통과)
    # ────────────────────────────────────────────────────────────
    # Gold는 조건부: "gold mining/mine/ore/deposit" 등 광업 맥락만
    # 포함. "gold reserves/price"는 exclusion_terms에서 차단됨.
    core_minerals:
      # ── 영어 광종명 ──
      - "lithium"
      - "cobalt"
      - "nickel"
      - "manganese"
      - "graphite"
      - "tungsten"
      - "molybdenum"
      - "vanadium"
      - "titanium"
      - "niobium"
      - "tantalum"
      - "uranium"
      - "fluorspar"
      - "antimony"
      - "rare earth"
      - "rare earths"
      - "rare metal"
      - "rare metals"
      - "bauxite"
      - "potash"
      - "chromium"
      - "platinum"
      # Copper (몽골 Oyu Tolgoi, 라오스, 우즈벡 Almalyk 등 국가
      # 주요 광종으로 포함. 시세 맥락은 exclusion에서 차단)
      - "copper"
      - "구리"
      # Gold (박사님 결정 2026-05-15: 탄자니아·우즈벡 등 국가 주요
      # 광종으로 무조건 포함. "gold reserves/price"는 exclusion에서
      # 외환·시세 맥락 차단됨)
      - "gold"
      # ── 한국어 광종명 ──
      - "리튬"
      - "코발트"
      - "니켈"
      - "망간"
      - "흑연"
      - "텅스텐"
      - "몰리브덴"
      - "바나듐"
      - "티타늄"
      - "니오븀"
      - "탄탈럼"
      - "희토류"
      - "희유금속"
      - "희소금속"
      - "희귀금속"
