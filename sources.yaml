# =====================================================================
# Tier 1A: Tanzania government (Phase A - madini.go.tz만 작동 확인)
# =====================================================================
# 박사님 2026-05-14 진단 결과:
#   - madini.go.tz 2개 채널: 정상 작동 (각 2건 qualified)
#   - tumemadini.go.tz: SSL 인증서 오류로 GitHub Actions에서 차단
#   - gst.go.tz, stamico.co.tz: 응답 있지만 30일간 0건 qualified
# 응급조치 (2026-05): 작동하지 않는 소스 비활성화. 매주 12분 → 2분
tier_1_tanzania:
  weight: 5
  sources:
    - name: "Wizara ya Madini - Press Release"
      url: "https://www.madini.go.tz/otherpage/?p=press-release"
      rss: null
      scrape_method: html_listing
      country: Tanzania
      language: sw
      verified: true
      priority_boost: 3
      note: "박사님 진단으로 GitHub Actions에서도 작동 확인됨 (2026-05)"

    - name: "Wizara ya Madini - Latest News"
      url: "https://www.madini.go.tz/otherpage/?p=latest-news"
      rss: null
      scrape_method: html_listing
      country: Tanzania
      language: sw
      verified: true
      priority_boost: 2

# =====================================================================
# Tier 1B-G: Other countries government (응급조치 2026-05)
# =====================================================================
# 박사님 진단 결과 (2026-05-14):
#   - 인도네시아 ESDM 3개: 응답 있지만 30일간 0건 qualified
#   - 베트남 MOIT 2개: 403 Forbidden (GitHub Actions IP 차단)
#   - 베트남 VIMICO: 응답 있지만 0건 qualified
#   - 몽골 MRPAM/MMHI: 응답 있지만 0건 qualified
#   - 카자흐 gov.kz: 응답 없음 (0 items fetched)
#   - 우즈베크 mingeo.uz/geology.uz: SSL 오류 / 404
#   - 라오스 moic.gov.la: 응답 없음 (통합 후 새 사이트)
#
# 응급 조치: 작동 안 하는 정부 사이트 모두 비활성화.
#           이 국가들은 Tier 4 Google News로만 운영.
#           각 국가별 sources 빈 배열로 두면 collect.py가 자동으로 건너뜀.
# 추후 검토: 박사님 KIGAM 환경 또는 외부 클라우드(아시아 리전)에서
#           작동 가능성 별도 검증 필요.

tier_1_indonesia:
  weight: 5
  sources: []  # 모든 ESDM 사이트가 30일간 0건 qualified

tier_1_vietnam:
  weight: 5
  sources: []  # MOIT 403 Forbidden, VIMICO 0건

tier_1_mongolia:
  weight: 5
