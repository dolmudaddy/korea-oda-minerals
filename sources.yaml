# =====================================================================
# Tier 1G: Laos government (KPL만 작동 확인)
# =====================================================================
# 2025-06-16 라오스 정부 조직개편: MEM(에너지광산부) → MOIC(산업통상부) 통합
# Source: KPL (Khaosan Pathet Lao), 18/06/2025
# moic.gov.la는 GitHub Actions에서 응답 없음. KPL은 정상 작동 (1건 qualified).
tier_1_laos:
  weight: 5
  sources:
    - name: "Lao News Agency (KPL) - English"
      url: "https://kpl.gov.la/En"
      rss: null
      scrape_method: html_listing
      country: Laos
      language: en
      verified: true
      priority_boost: 2
      note: "라오스 국가통신사. 부처 개편 등 정부 공식 발표 채널. 박사님 진단으로 GitHub Actions에서도 작동 확인."


